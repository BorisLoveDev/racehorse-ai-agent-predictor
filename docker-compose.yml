services:
  # SearXNG for web search (replaces Tavily)
  searxng:
    image: searxng/searxng:latest
    container_name: racehorse-searxng
    ports:
      - "8888:8080"  # External access for clawdbot (restricted by iptables to 95.142.41.188)
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./config/searxng:/etc/searxng:rw
      - searxng_data:/var/cache/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - racehorse-network

  # Redis for pub/sub messaging
  redis:
    image: redis:7-alpine
    container_name: racehorse-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - racehorse-network

  # Race Monitor Service
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
      target: monitor
    container_name: racehorse-monitor
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RACEHORSE_REDIS__HOST=redis
      - RACEHORSE_REDIS__PORT=6379
      - RACEHORSE_DATABASE__PATH=/app/data/races.db
    volumes:
      - db_data:/app/data
      - race_data:/app/race_data
    restart: unless-stopped
    networks:
      - racehorse-network

  # Agent Orchestrator Service
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: orchestrator
    container_name: racehorse-orchestrator
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RACEHORSE_REDIS__HOST=redis
      - RACEHORSE_REDIS__PORT=6379
      - RACEHORSE_DATABASE__PATH=/app/data/races.db
      - SEARXNG_URL=http://searxng:8080
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    networks:
      - racehorse-network

  # Results Evaluation Service
  results:
    build:
      context: .
      dockerfile: Dockerfile
      target: results
    container_name: racehorse-results
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RACEHORSE_REDIS__HOST=redis
      - RACEHORSE_REDIS__PORT=6379
      - RACEHORSE_DATABASE__PATH=/app/data/races.db
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    networks:
      - racehorse-network

  # Telegram Notification Service
  telegram:
    build:
      context: .
      dockerfile: Dockerfile
      target: telegram
    container_name: racehorse-telegram
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RACEHORSE_REDIS__HOST=redis
      - RACEHORSE_REDIS__PORT=6379
      - RACEHORSE_DATABASE__PATH=/app/data/races.db
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    networks:
      - racehorse-network

  # Stake Racing Advisor Service
  # WARNING (D-02): This service uses the SAME Telegram bot token as the 'telegram' service.
  # You MUST stop the telegram service before starting stake:
  #   docker compose stop telegram && docker compose up -d stake
  # Running both simultaneously will cause webhook/polling conflicts.
  stake:
    build:
      context: .
      dockerfile: Dockerfile
      target: stake
    container_name: racehorse-stake
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - STAKE_REDIS__URL=redis://redis:6379
      - STAKE_DATABASE_PATH=/app/data/races.db
      - STAKE_AUDIT__LOG_PATH=/app/data/stake_audit.jsonl
      - STAKE_TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - STAKE_TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - STAKE_OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - STAKE_PARSER__MODEL=${STAKE_PARSER_MODEL:-google/gemini-2.0-flash-001}
      - STAKE_PARSER__TEMPERATURE=${STAKE_PARSER_TEMPERATURE:-0.0}
      - STAKE_PARSER__MAX_TOKENS=${STAKE_PARSER_MAX_TOKENS:-4000}
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    networks:
      - racehorse-network

volumes:
  redis_data:
    driver: local
  db_data:
    driver: local
  race_data:
    driver: local
  searxng_data:
    driver: local

networks:
  racehorse-network:
    driver: bridge
